<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="Heimdall logo">
  <defs>
    <linearGradient id="hdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="hdRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="hdGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded card background -->
  <rect x="4" y="4" width="172" height="172" rx="36" ry="36" fill="#0f172a" stroke="url(#hdRing)" stroke-width="2"/>

  <!-- Outer all-seeing ring (watchman of Bifrost) -->
  <circle cx="90" cy="95" r="62" fill="none" stroke="url(#hdRing)" stroke-width="2.5" stroke-dasharray="6 6" opacity="0.55"/>

  <!-- Trident 🔱 rendered via Unicode in SVG text so it picks up the
       system emoji font on every platform. Huge font-size, centered. -->
  <text x="90" y="118"
        text-anchor="middle"
        font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif"
        font-size="86"
        filter="url(#hdGlow)">🔱</text>

  <!-- Wordmark -->
  <text x="90" y="155"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="15"
        font-weight="800"
        fill="#e2e8f0"
        letter-spacing="2.5">HEIMDALL</text>
</svg>

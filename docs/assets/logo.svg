<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="GrafanaProbe logo">
  <defs>
    <linearGradient id="gpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gpRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="gpGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect x="4" y="4" width="172" height="172" rx="36" ry="36" fill="#0f172a" stroke="url(#gpRing)" stroke-width="2"/>

  <!-- Outer probe ring (tilted) -->
  <circle cx="90" cy="90" r="62" fill="none" stroke="url(#gpRing)" stroke-width="3" stroke-dasharray="6 6" opacity="0.55"/>
  <circle cx="90" cy="90" r="48" fill="none" stroke="url(#gpRing)" stroke-width="2" opacity="0.35"/>

  <!-- Signal spikes / waveform inside the ring -->
  <g stroke="url(#gpGrad)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#gpGlow)">
    <polyline points="48,100 60,100 66,84 72,116 78,72 84,108 90,92 96,104 102,82 108,100 120,100 132,100"/>
  </g>

  <!-- GP monogram -->
  <text x="90" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="800" fill="url(#gpGrad)" letter-spacing="-1">GP</text>

  <!-- Wordmark -->
  <text x="90" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14" font-weight="700" fill="#e2e8f0" letter-spacing="0.5">GrafanaProbe</text>
</svg>
